domain: real_estate
description: "Real estate data seeders \xE2\u20AC\u201D Toronto/Canada focus"
schema_migrations:
- db/migrations/001_municipality_tables.sql
- db/migrations/003_spell_corrections.sql
seeders:
- name: wikipedia_fsa
  class: seeders.real_estate.wikipedia_fsa.WikipediaFSASeeder
  enabled: true
  refresh_cadence: monthly
  license: CC BY-SA (Wikipedia)
  config:
    country: CA
    rate_limit_seconds: 1.0
- name: statscan_shapefile
  class: seeders.real_estate.statscan_shapefile.StatsCanShapefileSeeder
  enabled: true
  refresh_cadence: yearly
  license: Statistics Canada Open License
  config:
    fsa_shapefile: F:/case_study/lfsa000a21a_e/lfsa000a21a_e/lfsa000a21a_e.shp
    csd_shapefile: F:/case_study/lcsd000a25a_e/lcsd000a25a_e.shp
    country: CA
- name: spell_corrections
  class: seeders.real_estate.spell_corrections.SpellCorrectionsSeeder
  enabled: true
  refresh_cadence: as_needed
  license: internal
  config:
    seed_csv: data/seeds/real_estate/spell_corrections.csv
- name: query_packs
  class: seeders.real_estate.query_packs.QueryPackSeeder
  enabled: true
  refresh_cadence: as_needed
  license: internal
  config:
    packs_yaml: data/seeds/real_estate/query_packs.yaml
